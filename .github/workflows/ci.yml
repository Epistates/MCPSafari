name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build MCP Server
        run: |
          cd MCPServer
          swift build

      - name: Test MCP handshake
        run: |
          cd MCPServer
          swift build -c release

          # Verify the binary responds to MCP initialize
          RESPONSE=$(printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}\n' | timeout 5 .build/release/MCPSafari --port 0 2>/dev/null | head -1)

          if echo "$RESPONSE" | grep -q '"safari-mcp"'; then
            echo "✓ MCP handshake successful"
          else
            echo "✗ MCP handshake failed"
            echo "Response: $RESPONSE"
            exit 1
          fi

      - name: Build Safari Extension
        run: |
          cd MCPSafari
          xcodebuild -project MCPSafari.xcodeproj \
            -scheme "MCPSafari" \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO
