name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  build:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build MCP Server
        run: |
          cd MCPServer
          swift build

      - name: Test MCP handshake
        run: |
          cd MCPServer
          swift build -c release

          # Create a named pipe for communication
          mkfifo /tmp/mcp-stdin

          # Start the server in the background reading from the pipe
          .build/release/MCPSafari --port 0 < /tmp/mcp-stdin > /tmp/mcp-stdout 2>/dev/null &
          SERVER_PID=$!

          # Send initialize request (keep pipe open with exec)
          exec 3>/tmp/mcp-stdin
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' >&3

          # Wait for response
          sleep 3
          exec 3>&-

          RESPONSE=$(cat /tmp/mcp-stdout 2>/dev/null | head -1)
          kill $SERVER_PID 2>/dev/null || true
          rm -f /tmp/mcp-stdin /tmp/mcp-stdout

          if echo "$RESPONSE" | grep -q '"mcp-safari"'; then
            echo "✓ MCP handshake successful"
          else
            echo "✗ MCP handshake failed"
            echo "Response: $RESPONSE"
            exit 1
          fi

      - name: Build Safari Extension
        run: |
          cd MCPSafari
          xcodebuild -project MCPSafari.xcodeproj \
            -scheme "MCPSafari" \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO
